server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:library_portal;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-render.sql
spring.sql.init.data-locations=classpath:data-render.sql
